# render.yaml — Render Infrastructure as Code
# PostgreSQL database 'fossee-workshop-db' is already created manually on Render.
# This file deploys ONLY the web service, connecting to that existing DB.
# Must be placed at the GIT REPO ROOT.

services:
  - type: web
    name: fossee-workshop-backend
    runtime: python
    region: singapore
    plan: free

    # Django project is inside the nested workshop_booking-master subdirectory
    rootDir: workshop_booking-master

    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate --no-input
    startCommand: gunicorn workshop_portal.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health/

    envVars:
      # Internal Database URL — connects to fossee-workshop-db within Render's network
      - key: DATABASE_URL
        value: "postgresql://workshop_user:B9XqiQiPczq9FJTVr3KY14ITnqPzyZ44@dpg-d7bgmnmuk2gs738qdkk0-a:5432/workshop_db_31te"

      # Auto-generated secure secret key
      - key: DJANGO_SECRET_KEY
        generateValue: true

      - key: DEBUG
        value: "False"

      - key: PRODUCTION
        value: "True"

      - key: ALLOWED_HOSTS
        value: "ui-ux-newfossee-workshop-backend.onrender.com,localhost"

      - key: PRODUCTION_URL
        value: "https://ui-ux-newfossee-workshop-backend.onrender.com"

      - key: ADMIN_EMAIL
        value: "admin@example.com"

      # Email: logs to console for now — update to SMTP after verifying deploy works
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.console.EmailBackend"
