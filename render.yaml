# render.yaml — Render Infrastructure as Code
# Place this at the GIT REPO ROOT (not inside the Django project folder).
# Render reads this file automatically.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: fossee-workshop-backend
    runtime: python
    region: singapore            # Closest to India — change to oregon/frankfurt if needed
    plan: free                   # free | starter ($7/mo, no sleep timeout)

    # The Django project lives inside the workshop_booking-master subdirectory
    rootDir: workshop_booking-master

    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate --no-input
    startCommand: gunicorn workshop_portal.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health/

    envVars:
      # Auto-injected from the database below
      - key: DATABASE_URL
        fromDatabase:
          name: fossee-workshop-db
          property: connectionString

      # Render auto-generates a secure random secret key
      - key: DJANGO_SECRET_KEY
        generateValue: true

      - key: DEBUG
        value: "False"

      - key: PRODUCTION
        value: "True"

      - key: ALLOWED_HOSTS
        value: "fossee-workshop-backend.onrender.com,localhost"

      - key: PRODUCTION_URL
        value: "https://fossee-workshop-backend.onrender.com"

      - key: ADMIN_EMAIL
        value: "admin@example.com"          # ← Update this to your real email

      # Email: set to console for first deploy, update to SMTP after
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.console.EmailBackend"

      # Uncomment and fill in after first deploy to enable real emails:
      # - key: EMAIL_HOST
      #   value: "smtp.gmail.com"
      # - key: EMAIL_PORT
      #   value: "587"
      # - key: EMAIL_HOST_USER
      #   value: "youraddress@gmail.com"
      # - key: EMAIL_HOST_PASSWORD
      #   value: "your-app-password"
      # - key: EMAIL_USE_TLS
      #   value: "True"
      # - key: SENDER_EMAIL
      #   value: "youraddress@gmail.com"

      # Set after frontend is deployed:
      # - key: CORS_ALLOWED_ORIGINS
      #   value: "https://your-frontend.netlify.app"

databases:
  - name: fossee-workshop-db
    databaseName: workshop_db
    user: workshop_user
    plan: free                   # Free tier: 90 days active, then $7/mo or export
    region: singapore            # Must match service region above
