# render.yaml — Render Infrastructure as Code
# Defines both the Django web service and PostgreSQL database.
# Render reads this file automatically from your repo root.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: fossee-workshop-backend
    runtime: python
    region: oregon               # Change to: singapore, frankfurt, ohio
    plan: free                   # free | starter ($7/mo, no sleep)
    buildCommand: ./build.sh
    startCommand: gunicorn workshop_portal.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health/

    envVars:
      # Injected automatically by Render from the database below
      - key: DATABASE_URL
        fromDatabase:
          name: fossee-workshop-db
          property: connectionString

      # Set DJANGO_SECRET_KEY manually in Render dashboard (never commit it!)
      - key: DJANGO_SECRET_KEY
        generateValue: true       # Render auto-generates a secure one

      - key: DEBUG
        value: "False"

      - key: PRODUCTION
        value: "True"

      # Set this to your Render URL after first deploy:
      # e.g. fossee-workshop-backend.onrender.com
      - key: ALLOWED_HOSTS
        value: "fossee-workshop-backend.onrender.com,localhost"

      # Email — update with real SMTP creds in the Render dashboard
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.console.EmailBackend"

      - key: PRODUCTION_URL
        value: "https://fossee-workshop-backend.onrender.com"

      - key: ADMIN_EMAIL
        value: "admin@example.com"

databases:
  - name: fossee-workshop-db
    databaseName: workshop_db
    user: workshop_user
    plan: free                   # free PostgreSQL (90 days, then $7/mo)
    region: oregon               # Must match service region above
